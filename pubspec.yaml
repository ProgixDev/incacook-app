name: vinted_v2
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  get_storage: ^2.1.1
  lottie: ^3.3.3
  flutter_svg: ^2.2.4
  gap: ^3.0.1
  shimmer: ^3.0.0
  iconsax: ^0.0.8
  dio: ^5.9.2
  pretty_dio_logger: ^1.4.0
  connectivity_plus: ^7.1.1
  device_info_plus: ^13.0.0
  file_picker: ^3.0.4
  permission_handler: ^12.0.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  freezed: ^3.2.5
  logger: ^2.7.0
  flutter_screenutil: ^5.9.3
  visibility_detector: ^0.4.0+2
  intl: ^0.20.2
  vector_math: ^2.2.0
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^2.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1


flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/animations/onboarding/
    - assets/animations/user_type/
    - assets/icons/
    - assets/icons/home_categories/
    - assets/icons/payment/
    - assets/images/
    - assets/images/categories/
    - assets/images/onboarding/
    - assets/logos/
    - assets/test/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Italic.ttf
          style: italic
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 800
